<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Defender: Leaderboard Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Fredoka One', cursive;
            user-select: none;
            background-color: #222;
            cursor: crosshair;
        }

        /* --- HUD (Compact) --- */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 5;
        }

        .hud-group { display: flex; gap: 10px; }

        .hud-panel {
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            padding: 5px 15px;
            border-radius: 15px;
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            text-align: center;
            backdrop-filter: blur(3px);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hud-label {
            font-size: 10px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; margin-bottom: 2px;
        }

        #player-display { font-size: 14px; color: #00E676; margin-bottom: 2px; }
        #score-box { font-size: 22px; color: #FFD700; line-height: 1; }
        #lives-container { font-size: 18px; color: #FF4444; letter-spacing: 1px; line-height: 1; }
        #weapon-name { color: #FFFF00; font-size: 14px; line-height: 1.2; }

        #weapon-bar {
            margin-top: 4px; height: 6px; background: #333; border-radius: 3px; overflow: hidden; width: 100px;
        }
        #weapon-progress {
            height: 100%; width: 0%; background: linear-gradient(90deg, #FFFF00, #FF0000); transition: width 0.3s;
        }

        #combo-box { 
            position: absolute; top: 80px; left: 20px; font-size: 24px; color: #00FF00; 
            opacity: 0; transition: opacity 0.1s; text-shadow: 0 0 10px #00FF00;
        }

        #mission-banner {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
            font-size: 40px; color: #fff; -webkit-text-stroke: 2px #000;
            text-shadow: 0 0 15px rgba(0,0,0,0.5); white-space: nowrap; pointer-events: none;
            transition: transform 0.2s; opacity: 0.9;
        }

        /* --- SCREENS --- */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; color: white; backdrop-filter: blur(10px);
        }

        h1 { font-size: 70px; margin: 0 0 20px 0; color: #FFEB3B; text-shadow: 0 5px 0 #E65100; text-align: center; }
        p { font-size: 22px; line-height: 1.5; text-align: center; max-width: 800px; margin-bottom: 20px; }

        /* INPUT FIELD */
        #player-name-input {
            font-family: 'Fredoka One', cursive;
            font-size: 24px;
            padding: 15px;
            border-radius: 50px;
            border: 4px solid #fff;
            background: rgba(0,0,0,0.5);
            color: #fff;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 20px;
            width: 300px;
            outline: none;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            transition: 0.3s;
        }
        #player-name-input:focus {
            border-color: #00E676;
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.5);
        }

        button {
            padding: 20px 60px; font-size: 30px;
            background: linear-gradient(to bottom, #00C853, #1B5E20);
            border: 4px solid #fff; border-radius: 60px; color: white;
            font-family: inherit; cursor: pointer;
            box-shadow: 0 8px 0 #003300, 0 0 20px #00C853;
            transition: all 0.1s; text-transform: uppercase;
        }
        button:active { transform: translateY(6px); box-shadow: 0 4px 0 #003300; }
        button:hover { filter: brightness(1.2); }

        /* LEADERBOARD TABLE */
        #leaderboard {
            margin-top: 20px;
            margin-bottom: 20px;
            width: 400px;
            background: rgba(0,0,0,0.6);
            border-radius: 10px;
            padding: 10px;
            border: 2px solid #555;
        }
        .lb-row {
            display: flex; justify-content: space-between;
            padding: 8px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 20px;
        }
        .lb-row:last-child { border-bottom: none; }
        .lb-rank { color: #aaa; width: 30px; }
        .lb-name { color: #fff; flex-grow: 1; text-align: left; }
        .lb-score { color: #FFD700; font-weight: bold; }
        .current-score-row { background: rgba(0, 230, 118, 0.2); }

        #damage-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            pointer-events: none; z-index: 4; transition: box-shadow 0.2s;
        }
        
        @keyframes popIn {
            0% { transform: translateX(-50%) scale(0); }
            80% { transform: translateX(-50%) scale(1.1); }
            100% { transform: translateX(-50%) scale(1); }
        }
        
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-5px, 0, 0); }
            20%, 80% { transform: translate3d(5px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
            40%, 60% { transform: translate3d(8px, 0, 0); }
        }
    </style>
</head>
<body>

    <div id="damage-overlay"></div>

    <div id="ui-layer">
        <!-- Left Side -->
        <div class="hud-group">
            <div class="hud-panel">
                <div id="player-display">PLAYER</div>
                <div id="score">0</div>
            </div>
            
            <div class="hud-panel">
                 <div class="hud-label">Weapon</div>
                 <div id="weapon-name">Single</div>
                 <div id="weapon-bar"><div id="weapon-progress"></div></div>
            </div>
        </div>

        <div id="combo-box">COMBO x0</div>

        <!-- Right Side -->
        <div class="hud-panel">
            <div class="hud-label">Health</div>
            <div id="lives-container">❤️❤️❤️❤️❤️</div>
        </div>
    </div>

    <div id="mission-banner">READY?</div>

    <!-- START SCREEN -->
    <div id="start-screen" class="overlay">
        <h1>GLOBAL DEFENDER</h1>
        <p>
            1. Shoot <span style="color:#00E676">COUNTRIES</span> (Korea, US...)<br>
            2. Shoot <span style="color:#E040FB">NATIONALITIES</span> (Korean, American...)<br>
            ⚡ Shoot <span style="color:#FFFF00">LIGHTNING</span> to Upgrade!
        </p>
        
        <!-- NAME INPUT -->
        <input type="text" id="player-name-input" placeholder="TYPE YOUR NAME" maxlength="10" autocomplete="off">
        
        <button onclick="startGame()">START MISSION</button>
    </div>

    <!-- GAME OVER SCREEN -->
    <div id="game-over-screen" class="overlay" style="display: none;">
        <h1 style="color: #FF4444; font-size: 60px;">GAME OVER</h1>
        
        <!-- LEADERBOARD -->
        <div style="font-size: 14px; letter-spacing: 2px; color: #aaa; margin-bottom: 5px;">TOP SCORERS</div>
        <div id="leaderboard">
            <!-- JS will populate this -->
        </div>

        <button onclick="resetGame()" style="font-size: 24px; padding: 15px 40px; margin-top: 10px;">PLAY AGAIN</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function initAudio() {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    // --- SOUND EFFECTS ---
    const Sound = {
        shoot: (type) => {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            if(type === 'laser') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(200, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
            } else {
                osc.type = 'square';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            }
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        },
        hit: () => playTone(800, 'sine', 0.1),
        upgrade: () => playTone(1200, 'triangle', 0.2),
        bad: () => playTone(150, 'sawtooth', 0.3),
        heal: () => playTone(400, 'sine', 0.2)
    };

    function playTone(freq, type, duration) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    // --- GAME VARIABLES ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives-container');
    const comboEl = document.getElementById('combo-box');
    const missionBanner = document.getElementById('mission-banner');
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const damageOverlay = document.getElementById('damage-overlay');
    const weaponNameEl = document.getElementById('weapon-name');
    const weaponProgressEl = document.getElementById('weapon-progress');
    const nameInput = document.getElementById('player-name-input');
    const playerDisplay = document.getElementById('player-display');
    const leaderboardEl = document.getElementById('leaderboard');

    // Data
    const countryList = ['Korea', 'China', 'The US', 'The UK', 'Brazil', 'Japan', 'Malaysia', 'Mexico', 'Canada'];
    const nationalityList = ['Korean', 'Chinese', 'American', 'British', 'Brazilian', 'Japanese', 'Malaysian', 'Mexican', 'Canadian'];
    const bonusWords = ['Correct!', 'Great!', 'Super!', 'Wow!'];
    const distractions = ['Banana', 'Apple', 'Pizza', 'Car', 'Bus', 'Robot', 'Cat', 'Dog', 'Book', 'Shoe'];

    let gameRunning = false;
    let score = 0;
    const MAX_LIVES = 10;
    let lives = 10;
    let combo = 0;
    let frame = 0;
    let currentMode = 'country'; 
    let modeTimer = 0;
    let difficultyMultiplier = 1;
    let muzzleFlash = 0;
    let playerName = "Player";
    
    let weaponLevel = 0; 
    const weaponNames = ["Single", "Dual", "Tri", "LASER"];

    let bullets = [], enemies = [], particles = [], shockwaves = [], floatingTexts = [], beams = [], clouds = [];
    let mouseX = canvas.width / 2, mouseY = canvas.height / 2, screenShake = 0;

    // --- INIT ---
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        initClouds();
    }
    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
    window.addEventListener('mousedown', () => { if(gameRunning) shoot(); });
    
    function initClouds() {
        clouds = [];
        for(let i=0; i<10; i++) clouds.push({
            x: Math.random() * canvas.width, y: Math.random() * canvas.height,
            size: Math.random() * 60 + 40, speed: Math.random() * 0.5 + 0.1, opacity: 0.2
        });
    }
    resize();

    // --- GAME FLOW ---

    function startGame() {
        const inputName = nameInput.value.trim();
        if(inputName === "") {
            alert("Please enter your name, Agent!");
            return;
        }
        playerName = inputName;
        playerDisplay.innerText = playerName;

        initAudio();
        startScreen.style.display = 'none';
        gameOverScreen.style.display = 'none';
        gameRunning = true;
        
        // Reset State
        score = 0;
        lives = MAX_LIVES;
        combo = 0;
        frame = 0;
        weaponLevel = 0; 
        
        bullets = []; enemies = []; particles = []; shockwaves = []; floatingTexts = []; beams = [];
        
        updateUI();
        changeMode('country');
        loop();
    }

    function resetGame() {
        gameOverScreen.style.display = 'none';
        startScreen.style.display = 'flex';
        nameInput.value = ""; // Clear name for next player
        nameInput.focus();
    }

    function changeMode(mode) {
        currentMode = mode;
        modeTimer = 800;
        missionBanner.style.animation = 'none';
        missionBanner.offsetHeight; 
        missionBanner.style.animation = 'popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275)';

        if(mode === 'country') {
            missionBanner.innerText = "SHOOT THE COUNTRY!";
            missionBanner.style.color = "#00E676"; 
            missionBanner.style.textShadow = "0 0 20px #00E676";
        } else {
            missionBanner.innerText = "SHOOT THE NATIONALITY!";
            missionBanner.style.color = "#E040FB";
            missionBanner.style.textShadow = "0 0 20px #E040FB";
        }
    }

    // --- SHOOTING ---
    function shoot() {
        muzzleFlash = 5;
        const angle = Math.atan2(mouseY - canvas.height, mouseX - canvas.width / 2);
        const sx = canvas.width / 2;
        const sy = canvas.height - 60;

        if (weaponLevel === 3) {
            Sound.shoot('laser');
            fireLaser(sx, sy, angle);
            screenShake = 6;
        } 
        else if (weaponLevel === 2) {
            Sound.shoot();
            createBullet(sx, sy, angle, '#FF4500');
            createBullet(sx, sy, angle - 0.15, '#FF4500');
            createBullet(sx, sy, angle + 0.15, '#FF4500');
            screenShake = 4;
        } 
        else if (weaponLevel === 1) {
            Sound.shoot();
            createBullet(sx + 15, sy, angle, '#FFFF00');
            createBullet(sx - 15, sy, angle, '#FFFF00');
            screenShake = 3;
        } 
        else {
            Sound.shoot();
            createBullet(sx, sy, angle, '#FFF');
            screenShake = 2;
        }
    }

    function createBullet(x, y, angle, color) {
        bullets.push({ x: x, y: y, vx: Math.cos(angle) * 25, vy: Math.sin(angle) * 25, color: color, trail: [] });
    }

    function fireLaser(x, y, angle) {
        const ex = x + Math.cos(angle) * 1500;
        const ey = y + Math.sin(angle) * 1500;
        beams.push({ x1: x, y1: y, x2: ex, y2: ey, life: 1.0, color: '#00FFFF' });

        for (let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i];
            // Point-Line Distance Logic
            const A = x - e.x, B = y - e.y, C = ex - x, D = ey - y;
            const dot = A * C + B * D, len_sq = C * C + D * D;
            const param = -dot / len_sq;
            let xx, yy;
            if (param < 0) { xx = x; yy = y; }
            else if (param > 1) { xx = ex; yy = ey; }
            else { xx = x + param * C; yy = y + param * D; }
            const dist = Math.hypot(e.x - xx, e.y - yy);

            if (dist < e.radius + 20) handleHit(e, i, true);
        }
    }

    // --- GAME LOGIC ---
    function spawnEnemy() {
        difficultyMultiplier = 1 + (score / 3500);
        const spawnThreshold = Math.max(25, 60 - (score / 200));

        if (frame % Math.floor(spawnThreshold) !== 0) return;

        const rand = Math.random();
        let text, type, c1, c2;

        if (rand < 0.03) { text = '⚡'; type = 'upgrade'; c1 = '#FFFF00'; c2 = '#FBC02D'; } 
        else if (rand < 0.08) { text = '❤️'; type = 'health'; c1 = '#FF9999'; c2 = '#D50000'; } 
        else if (rand < 0.13) { text = bonusWords[Math.floor(Math.random() * bonusWords.length)]; type = 'bonus'; c1 = '#FFD700'; c2 = '#FF8F00'; } 
        else if (rand < 0.35) { text = distractions[Math.floor(Math.random() * distractions.length)]; type = 'distraction'; c1 = '#78909C'; c2 = '#37474F'; } 
        else {
            if(Math.random() > 0.5) { text = countryList[Math.floor(Math.random() * countryList.length)]; type = 'country'; c1 = '#00E676'; c2 = '#006064'; } 
            else { text = nationalityList[Math.floor(Math.random() * nationalityList.length)]; type = 'nationality'; c1 = '#E040FB'; c2 = '#4A148C'; }
        }

        enemies.push({
            x: Math.random() * (canvas.width - 120) + 60, y: -80,
            text: text, type: type, c1: c1, c2: c2,
            radius: (type === 'distraction' || type === 'health' || type === 'upgrade') ? 35 : 50,
            angle: Math.random() * Math.PI, rotSpeed: (Math.random() - 0.5) * 0.04,
            speed: (Math.random() * 1.5 + 1.2) * difficultyMultiplier, pulse: 0
        });
    }

    function handleHit(e, index, isLaser) {
        let correct = false, points = 0, msg = "", col = "#fff", isUpgrade = false;

        if (e.type === 'upgrade') { correct = true; isUpgrade = true; if (weaponLevel < 3) weaponLevel++; msg = "LEVEL UP!"; col = "#FFFF00"; Sound.upgrade(); }
        else if (e.type === 'health') { correct = true; if(lives < MAX_LIVES) lives++; msg = "HEAL!"; col = "#FF4444"; Sound.heal(); } 
        else if (e.type === 'bonus') { correct = true; points = 300; msg = "NICE!"; col = "#FFD700"; Sound.hit(); } 
        else if (e.type === 'distraction') { correct = false; msg = "NO!"; } 
        else if ((currentMode === 'country' && e.type === 'country') || (currentMode === 'nationality' && e.type === 'nationality')) {
            correct = true; points = 100; msg = "+100"; col = "#00E676"; Sound.hit();
        } else { correct = false; msg = "WRONG!"; }

        if (correct) {
            spawnShockwave(e.x, e.y, col);
            if(points > 0) {
                combo++;
                if(combo % 5 === 0) spawnParticles(e.x, e.y, ['#f00','#0f0','#00f','#ff0'][Math.floor(Math.random()*4)], 30, 2);
                score += points * Math.min(combo, 5);
                spawnFloatingText(e.x, e.y, "+" + (points * Math.min(combo, 5)), col);
            } else spawnFloatingText(e.x, e.y, msg, col);
            if(!isUpgrade) spawnParticles(e.x, e.y, col, 15);
        } else {
            Sound.bad(); lives--; combo = 0; if(weaponLevel > 0) weaponLevel--; 
            triggerShake(5); spawnShockwave(e.x, e.y, '#FF0000'); spawnParticles(e.x, e.y, '#FF0000', 20); spawnFloatingText(e.x, e.y, msg, '#FF0000');
            if(lives <= 0) gameOver();
        }
        updateUI();
        enemies.splice(index, 1);
    }

    // --- LEADERBOARD & GAME OVER ---
    function gameOver() {
        gameRunning = false;
        damageOverlay.style.boxShadow = 'none';
        Sound.bad();
        
        saveScore(playerName, score);
        showLeaderboard();

        gameOverScreen.style.display = 'flex';
    }

    function saveScore(name, score) {
        let scores = JSON.parse(localStorage.getItem('globalDefenderScores')) || [];
        scores.push({ name: name, score: score });
        scores.sort((a, b) => b.score - a.score);
        scores.splice(5); // Keep top 5
        localStorage.setItem('globalDefenderScores', JSON.stringify(scores));
    }

    function showLeaderboard() {
        let scores = JSON.parse(localStorage.getItem('globalDefenderScores')) || [];
        leaderboardEl.innerHTML = "";
        
        scores.forEach((entry, index) => {
            const isMe = (entry.name === playerName && entry.score === score);
            const row = document.createElement('div');
            row.className = 'lb-row' + (isMe ? ' current-score-row' : '');
            row.innerHTML = `
                <div class="lb-rank">#${index + 1}</div>
                <div class="lb-name">${entry.name}</div>
                <div class="lb-score">${entry.score.toLocaleString()}</div>
            `;
            leaderboardEl.appendChild(row);
        });
    }

    // --- VISUALS ---
    function spawnShockwave(x, y, color) { shockwaves.push({ x: x, y: y, radius: 10, alpha: 1, color: color }); }
    function spawnParticles(x, y, color, count, speedMult = 1) {
        for(let i=0; i<count; i++) particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 15 * speedMult, vy: (Math.random() - 0.5) * 15 * speedMult, life: 1, color: color, size: Math.random() * 8 + 2 });
    }
    function spawnFloatingText(x, y, text, color) { floatingTexts.push({ x: x, y: y, text: text, color: color, life: 1.5, dy: -2.5 }); }
    function triggerShake(amount) { screenShake = amount; document.body.classList.remove('shake'); void document.body.offsetWidth; document.body.classList.add('shake'); }

    function updateUI() {
        scoreEl.innerText = score.toLocaleString();
        weaponNameEl.innerText = weaponNames[weaponLevel];
        weaponProgressEl.style.width = ((weaponLevel + 1) * 25) + "%";
        
        if(weaponLevel === 3) weaponNameEl.style.color = "#00FFFF";
        else if (weaponLevel === 2) weaponNameEl.style.color = "#FF4500";
        else if (weaponLevel === 1) weaponNameEl.style.color = "#FFFF00";
        else weaponNameEl.style.color = "#FFF";

        let hearts = "❤️".repeat(lives);
        livesEl.innerHTML = (lives > 5) ? "❤️".repeat(5) + "<br>" + "❤️".repeat(lives - 5) : hearts;
        
        if(lives <= 3) damageOverlay.style.boxShadow = 'inset 0 0 150px rgba(255,0,0,0.5)';
        else damageOverlay.style.boxShadow = 'none';

        if(combo > 1) { comboEl.style.opacity = 1; comboEl.innerText = "COMBO " + combo + "x!"; comboEl.style.transform = `scale(${1 + (combo/15)})`; }
        else comboEl.style.opacity = 0;
    }

    // --- LOOP ---
    function loop() {
        if (!gameRunning) return;
        requestAnimationFrame(loop);

        let sx = 0, sy = 0;
        if(screenShake > 0) { sx = (Math.random()-0.5)*screenShake*5; sy = (Math.random()-0.5)*screenShake*5; screenShake *= 0.9; }
        ctx.save(); ctx.translate(sx, sy); ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // BG
        let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, currentMode === 'country' ? '#004D40' : '#311B92'); grad.addColorStop(1, '#1a1a1a');
        ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Grid
        ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 2;
        let offset = (Date.now() / 50) % 50;
        for(let i=0; i<canvas.width/50+1; i++) { ctx.beginPath(); ctx.moveTo(i*50, 0); ctx.lineTo(i*50, canvas.height); ctx.stroke(); }
        for(let i=0; i<canvas.height/50+1; i++) { ctx.beginPath(); ctx.moveTo(0, i*50+offset); ctx.lineTo(canvas.width, i*50+offset); ctx.stroke(); }

        frame++; modeTimer--;
        if (modeTimer <= 0) changeMode(currentMode === 'country' ? 'nationality' : 'country');
        spawnEnemy();

        // BEAMS
        for (let i = beams.length - 1; i >= 0; i--) {
            let b = beams[i]; b.life -= 0.1;
            ctx.beginPath(); ctx.moveTo(b.x1, b.y1); ctx.lineTo(b.x2, b.y2);
            ctx.lineWidth = 20 * b.life; ctx.strokeStyle = b.color; ctx.shadowBlur = 20; ctx.shadowColor = b.color; ctx.lineCap = 'round'; ctx.stroke();
            ctx.lineWidth = 8 * b.life; ctx.strokeStyle = '#FFFFFF'; ctx.stroke(); ctx.shadowBlur = 0;
            if(b.life <= 0) beams.splice(i, 1);
        }

        // BULLETS
        for (let i = bullets.length - 1; i >= 0; i--) {
            let b = bullets[i]; b.trail.push({x: b.x, y: b.y}); if(b.trail.length > 6) b.trail.shift();
            b.x += b.vx; b.y += b.vy;
            if(b.trail.length > 1) {
                ctx.beginPath(); ctx.moveTo(b.trail[0].x, b.trail[0].y); for(let t of b.trail) ctx.lineTo(t.x, t.y);
                ctx.strokeStyle = `rgba(255, 255, 255, 0.5)`; ctx.lineWidth = 6; ctx.stroke();
            }
            ctx.shadowBlur = 15; ctx.shadowColor = b.color; ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(b.x, b.y, 8, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
            if (b.y < -50 || b.x < -50 || b.x > canvas.width + 50) bullets.splice(i, 1);
        }

        // ENEMIES
        for (let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i]; e.y += e.speed; e.angle += e.rotSpeed; e.pulse += 0.1;
            ctx.save(); ctx.translate(e.x, e.y);
            let isTarget = (currentMode === 'country' && e.type === 'country') || (currentMode === 'nationality' && e.type === 'nationality');
            
            if(isTarget) { ctx.shadowColor = 'white'; ctx.shadowBlur = 15 + Math.sin(e.pulse)*10; } 
            else if (e.type === 'upgrade') { ctx.shadowColor = '#FFFF00'; ctx.shadowBlur = 20 + Math.sin(e.pulse * 2)*15; }

            let g = ctx.createRadialGradient(-15, -15, 5, 0, 0, e.radius); g.addColorStop(0, e.c1); g.addColorStop(1, e.c2);
            ctx.beginPath(); ctx.arc(0, 0, e.radius, 0, Math.PI * 2); ctx.fillStyle = g; ctx.fill(); ctx.shadowBlur = 0;
            
            ctx.beginPath(); ctx.arc(-e.radius*0.3, -e.radius*0.3, e.radius*0.2, 0, Math.PI*2); ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.lineWidth = 4; ctx.stroke();

            ctx.rotate(e.angle * 0.2); ctx.fillStyle = '#fff';
            if(e.type === 'upgrade') ctx.font = '50px Arial'; else if (e.type === 'health') ctx.font = '40px Arial'; else ctx.font = 'bold 20px "Fredoka One"';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.shadowColor = 'black'; ctx.shadowBlur = 4;
            ctx.fillText(e.text, 0, (e.text === '❤️' || e.text === '⚡' ? 5 : 0)); ctx.restore();

            let hit = false;
            for (let j = bullets.length - 1; j >= 0; j--) {
                let b = bullets[j];
                if (Math.hypot(e.x - b.x, e.y - b.y) < e.radius + 15) {
                    bullets.splice(j, 1); hit = true; handleHit(e, i); break;
                }
            }
            if(hit) continue;

            if (e.y > canvas.height) {
                if(isTarget) { lives--; combo = 0; if(weaponLevel > 0) weaponLevel--; triggerShake(2); spawnFloatingText(e.x, canvas.height - 50, "MISSED", '#FF8888'); Sound.bad(); if(lives <= 0) gameOver(); }
                updateUI(); enemies.splice(i, 1);
            }
        }

        // FX
        for (let i = shockwaves.length - 1; i >= 0; i--) {
            let s = shockwaves[i]; s.radius += 4; s.alpha -= 0.05;
            ctx.beginPath(); ctx.arc(s.x, s.y, s.radius, 0, Math.PI*2); ctx.strokeStyle = s.color; ctx.lineWidth = 4; ctx.globalAlpha = s.alpha; ctx.stroke(); ctx.globalAlpha = 1;
            if(s.alpha <= 0) shockwaves.splice(i, 1);
        }
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.5; p.life -= 0.03;
            ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1;
            if(p.life <= 0) particles.splice(i, 1);
        }
        for (let i = floatingTexts.length - 1; i >= 0; i--) {
            let ft = floatingTexts[i]; ft.y += ft.dy; ft.life -= 0.02;
            ctx.globalAlpha = Math.min(1, ft.life * 2); ctx.save(); ctx.translate(ft.x, ft.y); ctx.scale(1 + (1-ft.life), 1 + (1-ft.life));
            ctx.font = "bold 35px 'Fredoka One'"; ctx.fillStyle = ft.color; ctx.strokeStyle = 'black'; ctx.lineWidth = 4; ctx.strokeText(ft.text, 0, 0); ctx.fillText(ft.text, 0, 0);
            ctx.restore(); ctx.globalAlpha = 1; if(ft.life <= 0) floatingTexts.splice(i, 1);
        }

        // CANNON
        ctx.save(); ctx.translate(canvas.width / 2, canvas.height - 40);
        const ang = Math.atan2(mouseY - canvas.height, mouseX - canvas.width / 2); ctx.rotate(ang + Math.PI / 2);
        if(muzzleFlash > 0) { ctx.save(); ctx.translate(0, -90); ctx.fillStyle = `rgba(255, 255, 100, ${muzzleFlash/5})`; ctx.beginPath(); ctx.arc(0, 0, 40 + Math.random()*20, 0, Math.PI*2); ctx.fill(); ctx.restore(); muzzleFlash--; }
        let gr = ctx.createLinearGradient(-25, 0, 25, 0); gr.addColorStop(0, '#222'); gr.addColorStop(0.5, '#555'); gr.addColorStop(1, '#222'); ctx.fillStyle = gr; ctx.fillRect(-25, -80, 50, 80);
        ctx.shadowBlur = 10; let nc = '#FFF'; if(weaponLevel === 1) nc = '#FFFF00'; if(weaponLevel === 2) nc = '#FF4500'; if(weaponLevel === 3) nc = '#00FFFF';
        ctx.shadowColor = nc; ctx.fillStyle = nc; ctx.fillRect(-25, -75, 50, 10); ctx.fillRect(-25, -45, 50, 10); ctx.shadowBlur = 0;
        ctx.beginPath(); ctx.arc(0, 0, 55, 0, Math.PI * 2); ctx.fillStyle = '#333'; ctx.fill(); ctx.strokeStyle = '#888'; ctx.lineWidth = 4; ctx.stroke();
        ctx.restore();
        ctx.restore();
    }
</script>
